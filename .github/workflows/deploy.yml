name: Deploy to RunPod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RunPod main-app update
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.VPS_TOKEN }}" \
            https://gbyl00lvgug80g-8787.proxy.runpod.net/admin/update
          echo "Deploy triggered"

